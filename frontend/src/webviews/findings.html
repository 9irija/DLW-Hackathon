<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <title>Code Review — Findings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: var(--vscode-editor-background);
      color: var(--vscode-foreground);
      font-family: var(--vscode-font-family, 'Segoe UI', sans-serif);
      font-size: 13px; padding: 20px; margin: 0;
    }
    h1 { font-size: 1.15rem; margin: 0 0 12px; }

    /* ── Pipeline strip ──────────────────────────────────────────────── */
    .pipeline {
      display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
      padding: 10px 0 14px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--vscode-panel-border);
    }
    .pipeline-step {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 12px; border-radius: 14px;
      font-size: 0.76rem; font-weight: 600;
      border: 1px solid currentColor; white-space: nowrap;
      cursor: default;
    }
    .pipeline-arrow { opacity: 0.35; font-size: 0.9rem; padding: 0 2px; flex-shrink: 0; }
    .ps-pass    { color: #89d185; }
    .ps-warn    { color: #cca700; }
    .ps-fail    { color: #f48771; }
    .ps-pending { color: #666; border-style: dashed; }
    .ps-skipped { color: #555; border-style: dashed; opacity: 0.55; }

    /* ── Review header ───────────────────────────────────────────────── */
    .review-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
    .verdict-badge {
      display: inline-block; padding: 5px 14px; border-radius: 4px;
      font-weight: bold; font-size: 0.9rem;
    }
    .approve         { background: #1e4620; color: #89d185; }
    .request-changes { background: #4d3800; color: #cca700; }
    .block           { background: #4d0000; color: #f48771; }
    .score-pill {
      padding: 4px 12px; border-radius: 12px; font-size: 0.82rem;
      border: 1px solid var(--vscode-panel-border);
    }
    .summary-text { font-size: 0.8rem; opacity: 0.75; max-width: 560px; line-height: 1.5; }

    /* ── Severity bar ────────────────────────────────────────────────── */
    .sev-bar-wrap { margin-bottom: 16px; }
    .sev-bar-track {
      display: flex; height: 7px; border-radius: 4px; overflow: hidden;
      background: rgba(128,128,128,0.12); width: 100%;
    }
    .sev-bar-seg  { height: 100%; transition: width 0.55s ease; }
    .sev-bar-labels { display: flex; gap: 12px; margin-top: 5px; flex-wrap: wrap; }
    .sev-bar-lbl  { font-size: 0.72rem; font-weight: 600; }

    /* ── Severity count badges ───────────────────────────────────────── */
    .counts { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .count-badge { padding: 3px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; }
    .cnt-critical { background: rgba(229,20,0,0.15);   color: #e51400; }
    .cnt-high     { background: rgba(244,135,113,0.15); color: #f48771; }
    .cnt-medium   { background: rgba(204,167,0,0.15);   color: #cca700; }
    .cnt-low      { background: rgba(137,209,133,0.15); color: #89d185; }

    /* ── Findings table ──────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    thead th {
      background: var(--vscode-editor-lineHighlightBackground);
      padding: 7px 10px; text-align: left;
      border-bottom: 2px solid var(--vscode-panel-border); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--vscode-panel-border); }
    tbody tr:hover { background: var(--vscode-list-hoverBackground); }
    td { padding: 7px 10px; vertical-align: top; }

    .sev-critical { color: #e51400; font-weight: bold; }
    .sev-high     { color: #f48771; }
    .sev-medium   { color: #cca700; }
    .sev-low      { color: #89d185; }

    .source-chip {
      display: inline-block; padding: 1px 7px; border-radius: 3px;
      font-size: 0.7rem; font-weight: 600; white-space: nowrap;
    }
    .src-builder     { background: rgba(99,179,237,0.15);  color: #63b3ed; }
    .src-factchecker { background: rgba(204,167,0,0.15);   color: #cca700; }
    .src-attacker    { background: rgba(244,135,113,0.15); color: #f48771; }
    .src-skeptic     { background: rgba(137,209,133,0.15); color: #89d185; }

    .cwe-badge {
      display: inline-block; font-size: 0.68rem; padding: 1px 5px;
      border: 1px solid #f48771; border-radius: 3px; color: #f48771;
      margin-left: 4px; white-space: nowrap; vertical-align: middle;
    }
    .detail-row td {
      padding: 3px 10px 7px 28px; font-size: 0.78rem; opacity: 0.8; border-bottom: none;
    }
    .detail-label { font-weight: bold; color: var(--vscode-descriptionForeground); }
    .detail-mono  { font-family: monospace; }

    .challenge-row td { padding: 3px 10px 8px 28px; font-size: 0.78rem; border-bottom: none; }
    .challenge-box {
      background: rgba(99,179,237,0.08); border-left: 3px solid #63b3ed;
      padding: 6px 10px; border-radius: 0 4px 4px 0;
    }
    .challenge-assessment {
      display: inline-block; font-size: 0.7rem; font-weight: bold;
      padding: 1px 7px; border-radius: 3px; margin-bottom: 4px;
    }
    .assessment-acknowledged { background: rgba(204,167,0,0.2);   color: #cca700; }
    .assessment-disputed     { background: rgba(99,179,237,0.2);  color: #63b3ed; }
    .assessment-requires_fix { background: rgba(244,135,113,0.2); color: #f48771; }

    /* ── In-progress banner ──────────────────────────────────────────── */
    .in-progress-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; border-radius: 5px; font-size: 0.82rem; margin-bottom: 16px;
      background: rgba(99,179,237,0.08); border: 1px solid rgba(99,179,237,0.25);
    }
    .spin { display: inline-block; animation: spin 1.1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { opacity: 0.5; font-style: italic; padding: 12px 0; }
  </style>
</head>
<body>
  <div id="root"><p class="empty">No review data — run a review first (Ctrl+Shift+P → "Code Review: Review Current File").</p></div>
  <script>
    /*INJECT_DATA*/

    const root = document.getElementById('root');
    if (reviewData && reviewData.verdict) {
      root.innerHTML = '';
      renderPage(reviewData);
    } else if (reviewData && reviewData.agentResults) {
      root.innerHTML = '';
      renderIntermediate(reviewData);
    }

    // ── Pipeline strip ────────────────────────────────────────────────────────
    function renderPipeline(agentResults, agentStatuses) {
      const STEPS = [
        { id: 'builder',     label: 'Builder'     },
        { id: 'factchecker', label: 'Factchecker' },
        { id: 'attacker',    label: 'Attacker'    },
        { id: 'skeptic',     label: 'Skeptic'     },
      ];
      const wrap = document.createElement('div');
      wrap.className = 'pipeline';

      STEPS.forEach((step, i) => {
        if (i > 0) {
          const arr = document.createElement('span');
          arr.className = 'pipeline-arrow';
          arr.textContent = '→';
          wrap.appendChild(arr);
        }
        const status = agentStatuses?.[step.id] ?? agentResults?.[step.id]?.status ?? null;
        let cls, icon;
        if      (!status || status === 'pending') { cls = 'ps-pending'; icon = '⏳'; }
        else if (status === 'skipped')            { cls = 'ps-skipped'; icon = '—';  }
        else if (status === 'pass')               { cls = 'ps-pass';    icon = '✅'; }
        else if (status === 'warn')               { cls = 'ps-warn';    icon = '⚠️'; }
        else if (status === 'fail')               { cls = 'ps-fail';    icon = '❌'; }
        else                                      { cls = 'ps-fail';    icon = '💥'; }

        const node = document.createElement('div');
        node.className = `pipeline-step ${cls}`;
        const tip = agentResults?.[step.id]?.summary ?? '';
        if (tip) node.title = tip;
        node.innerHTML = `${icon} ${step.label}`;
        if (status === 'skipped') {
          node.innerHTML += ' <span style="font-size:0.65rem;opacity:0.65">(skipped)</span>';
        }
        wrap.appendChild(node);
      });
      return wrap;
    }

    // ── Severity bar ──────────────────────────────────────────────────────────
    function renderSeverityBar(findings) {
      const counts = { critical: 0, high: 0, medium: 0, low: 0 };
      (findings || []).forEach(f => { if (counts[f.severity] !== undefined) counts[f.severity]++; });
      const total = Object.values(counts).reduce((a, b) => a + b, 0);
      if (!total) return null;

      const colors = { critical: '#e51400', high: '#f48771', medium: '#cca700', low: '#89d185' };
      const wrap   = document.createElement('div');
      wrap.className = 'sev-bar-wrap';
      const track  = document.createElement('div');
      track.className = 'sev-bar-track';
      const labels = document.createElement('div');
      labels.className = 'sev-bar-labels';

      for (const [sev, n] of Object.entries(counts)) {
        if (!n) continue;
        const pct = (n / total * 100).toFixed(2);
        const seg = document.createElement('div');
        seg.className = 'sev-bar-seg';
        seg.style.cssText = `width:0;background:${colors[sev]}`;
        track.appendChild(seg);
        // Animate width in on next frame
        requestAnimationFrame(() => requestAnimationFrame(() => { seg.style.width = pct + '%'; }));

        const lbl = document.createElement('span');
        lbl.className = 'sev-bar-lbl';
        lbl.style.color = colors[sev];
        lbl.textContent = `${n} ${sev}`;
        labels.appendChild(lbl);
      }
      wrap.appendChild(track);
      wrap.appendChild(labels);
      return wrap;
    }

    // ── Final orchestrated view ───────────────────────────────────────────────
    function renderPage(d) {
      const { verdict, score, summary, prioritizedFindings = [], agentResults, agentStatuses } = d;

      // Pipeline
      root.appendChild(renderPipeline(agentResults, agentStatuses));

      // Header
      const header = document.createElement('div');
      header.innerHTML = '<h1>Code Review Findings</h1>';
      const rev = document.createElement('div');
      rev.className = 'review-header';
      rev.innerHTML =
        `<span class="verdict-badge ${verdict ?? 'approve'}">${(verdict ?? 'unknown').toUpperCase()}</span>` +
        `<span class="score-pill">Score: <strong>${score ?? '—'}</strong> / 100</span>` +
        `<span class="summary-text">${escHtml(summary ?? '')}</span>`;
      header.appendChild(rev);
      root.appendChild(header);

      // Severity bar
      const sevBar = renderSeverityBar(prioritizedFindings);
      if (sevBar) root.appendChild(sevBar);

      // Count badges
      const counts = { critical: 0, high: 0, medium: 0, low: 0 };
      prioritizedFindings.forEach(f => { if (counts[f.severity] !== undefined) counts[f.severity]++; });
      if (prioritizedFindings.length) {
        const countsDiv = document.createElement('div');
        countsDiv.className = 'counts';
        for (const [sev, n] of Object.entries(counts)) {
          if (!n) continue;
          const badge = document.createElement('span');
          badge.className = `count-badge cnt-${sev}`;
          badge.textContent = `${n} ${sev}`;
          countsDiv.appendChild(badge);
        }
        root.appendChild(countsDiv);
      }

      if (!prioritizedFindings.length) {
        const p = document.createElement('p');
        p.className = 'empty';
        p.textContent = 'No findings detected. All agents passed.';
        root.appendChild(p);
        return;
      }

      const table = document.createElement('table');
      table.innerHTML = `<thead><tr>
        <th>#</th><th>Agent</th><th>Line</th><th>Severity</th>
        <th>Type</th><th>Description</th><th>Suggestion</th>
      </tr></thead>`;
      const tbody = document.createElement('tbody');

      prioritizedFindings.forEach((f, i) => {
        const tr = document.createElement('tr');
        const cweHtml = f.cwe
          ? `<span class="cwe-badge" title="Common Weakness Enumeration">CWE-${escHtml(String(f.cwe))}</span>`
          : '';
        tr.innerHTML =
          `<td style="opacity:0.5">${i + 1}</td>` +
          `<td><span class="source-chip src-${f.source ?? 'builder'}">${escHtml(f.source ?? '')}</span></td>` +
          `<td style="white-space:nowrap">${f.line ?? '—'}</td>` +
          `<td class="sev-${f.severity ?? 'low'}" style="white-space:nowrap">${f.severity ?? ''}</td>` +
          `<td style="white-space:nowrap">${escHtml(f.type ?? '')}</td>` +
          `<td>${escHtml(f.description ?? '')}${cweHtml}</td>` +
          `<td style="opacity:0.8">${escHtml(f.suggestion ?? '')}</td>`;
        tbody.appendChild(tr);

        // Factchecker: claim / reality / docSource / docSection
        if (f.claim || f.reality) {
          const dr = document.createElement('tr');
          dr.className = 'detail-row';
          const parts = [];
          if (f.docSource)  parts.push(`<span class="detail-label">Doc:</span> <span style="font-style:italic;opacity:0.8">${escHtml(f.docSource)}</span>`);
          if (f.docSection) parts.push(`<span class="detail-label">Section:</span> <span class="detail-mono">${escHtml(f.docSection)}</span>`);
          if (f.claim)      parts.push(`<span class="detail-label">Claim:</span> <span class="detail-mono">${escHtml(f.claim)}</span>`);
          if (f.reality)    parts.push(`<span class="detail-label">Reality:</span> <span class="detail-mono">${escHtml(f.reality)}</span>`);
          dr.innerHTML = `<td colspan="7">${parts.join(' &nbsp;|&nbsp; ')}</td>`;
          tbody.appendChild(dr);
        }

        // Skeptic: confidence / category
        if (f.confidence != null) {
          const dr = document.createElement('tr');
          dr.className = 'detail-row';
          let txt = `<span class="detail-label">Confidence:</span> ${f.confidence}/100`;
          if (f.category) txt += ` &nbsp;|&nbsp; <span class="detail-label">Category:</span> ${escHtml(f.category)}`;
          dr.innerHTML = `<td colspan="7">${txt}</td>`;
          tbody.appendChild(dr);
        }

        // Attacker: vector / impact
        if (f.attackVector || f.impact) {
          const dr = document.createElement('tr');
          dr.className = 'detail-row';
          const parts = [];
          if (f.attackVector) parts.push(`<span class="detail-label">Vector:</span> ${escHtml(f.attackVector)}`);
          if (f.impact)       parts.push(`<span class="detail-label">Impact:</span> ${escHtml(f.impact)}`);
          dr.innerHTML = `<td colspan="7">${parts.join(' &nbsp;|&nbsp; ')}</td>`;
          tbody.appendChild(dr);
        }

        // PoC exploit proof
        if (f.exploitProof) {
          const dr = document.createElement('tr');
          dr.className = 'detail-row';
          const confirmed = f.exploitProof.confirmed;
          const pocOut = f.exploitProof.output
            ? ` — <span class="detail-mono" style="font-size:0.75rem">${escHtml(String(f.exploitProof.output).slice(0, 140))}</span>`
            : '';
          dr.innerHTML = `<td colspan="7">
            <span class="detail-label">PoC:</span>
            <span style="color:${confirmed ? '#f48771' : '#89d185'};font-weight:bold">
              ${confirmed ? '⚡ Confirmed exploit' : '✓ Not confirmed'}
            </span>${pocOut}</td>`;
          tbody.appendChild(dr);
        }

        // Builder challenge response
        if (f.challengeResponse) {
          const cr   = f.challengeResponse;
          const asmt = String(cr.assessment ?? 'unknown').replace(/[^a-z_]/g, '');
          const dr   = document.createElement('tr');
          dr.className = 'challenge-row';
          dr.innerHTML = `<td colspan="7"><div class="challenge-box">
            <span class="challenge-assessment assessment-${asmt}">Builder: ${escHtml(cr.assessment ?? '')}</span><br>
            ${cr.explanation ? `<span>${escHtml(cr.explanation)}</span>` : ''}
            ${cr.proposedFix ? `<div style="margin-top:4px"><span class="detail-label">Proposed fix:</span> <code style="font-size:0.78rem">${escHtml(String(cr.proposedFix).slice(0, 240))}</code></div>` : ''}
          </div></td>`;
          tbody.appendChild(dr);
        }
      });

      table.appendChild(tbody);
      root.appendChild(table);
    }

    // ── Intermediate stepped view ─────────────────────────────────────────────
    function renderIntermediate(d) {
      const agentResults = d.agentResults || {};
      const agentOrder   = ['builder', 'factchecker', 'attacker', 'skeptic'];
      const ran          = agentOrder.filter(a => agentResults[a]);

      // Pipeline (pass null for agentStatuses — derive from agentResults)
      root.appendChild(renderPipeline(agentResults, null));

      // In-progress banner
      const banner = document.createElement('div');
      banner.className = 'in-progress-banner';
      banner.innerHTML =
        `<span class="spin">⟳</span>` +
        `<strong>${ran.length} / 4</strong>&nbsp;agents complete — respond to the checkpoint prompt to continue.`;
      root.appendChild(banner);

      // Severity bar (aggregate across all partial findings)
      const allFindings = Object.values(agentResults).flatMap(r => r?.findings || []);
      const sevBar = renderSeverityBar(allFindings);
      if (sevBar) root.appendChild(sevBar);

      let anyFindings = false;
      ran.forEach(agentName => {
        const result   = agentResults[agentName];
        const findings = result?.findings || [];
        if (!findings.length) return;
        anyFindings = true;

        const section  = document.createElement('div');
        section.style.cssText = 'margin-bottom:20px';

        const icon = { pass: '✅', warn: '⚠️', fail: '❌', error: '🔴', skipped: '—' }[result.status] ?? '❓';
        const heading = document.createElement('h2');
        heading.style.cssText = 'font-size:0.95rem;margin:0 0 8px';
        heading.innerHTML =
          `<span class="source-chip src-${agentName}" style="font-size:0.8rem;padding:2px 8px">${agentName}</span>` +
          ` ${icon} ${findings.length} finding(s)`;
        section.appendChild(heading);

        const table = document.createElement('table');
        table.innerHTML = `<thead><tr>
          <th>Line</th><th>Severity</th><th>Type</th><th>Description</th><th>Suggestion</th>
        </tr></thead>`;
        const tbody = document.createElement('tbody');

        findings.forEach(f => {
          const tr = document.createElement('tr');
          tr.innerHTML =
            `<td style="white-space:nowrap">${f.line ?? '—'}</td>` +
            `<td class="sev-${f.severity ?? 'low'}" style="white-space:nowrap">${f.severity ?? ''}</td>` +
            `<td style="white-space:nowrap">${escHtml(f.type ?? f.category ?? 'issue')}</td>` +
            `<td>${escHtml(f.description ?? f.claim ?? '')}</td>` +
            `<td style="opacity:0.8">${escHtml(f.suggestion ?? '')}</td>`;
          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        section.appendChild(table);
        root.appendChild(section);
      });

      if (!anyFindings) {
        const p = document.createElement('p');
        p.className = 'empty';
        p.textContent = 'No findings from completed agents so far.';
        root.appendChild(p);
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
